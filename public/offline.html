<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OOWAPP — Offline</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: #ffffff;
        color: #1a1a1a;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        -webkit-font-smoothing: antialiased;
      }
      .card { max-width: 360px; width: 100%; text-align: center; }
      .logo {
        width: 80px; height: 80px;
        margin: 0 auto 1.25rem;
        border-radius: 18px;
        object-fit: contain;
        background: #f4f4f5;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
        background: #f4f4f5;
        border-radius: 9999px;
        padding: 0.3rem 0.875rem;
        font-size: 0.8125rem;
        font-weight: 500;
        color: #71717a;
        margin-bottom: 1.25rem;
      }
      .badge svg { flex-shrink: 0; }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em; }
      p { color: #71717a; font-size: 0.9375rem; line-height: 1.6; }
      .retry {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 1.75rem;
        padding: 0.625rem 1.375rem;
        background: #1a1a1a;
        color: #ffffff;
        border: none;
        border-radius: 0.625rem;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        letter-spacing: -0.006em;
      }
      .retry:hover { background: #2a2a2a; }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/logo_1.webp" alt="OOWAPP" class="logo" />
      <div class="badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
        No internet connection
      </div>
      <h1>You're offline</h1>
      <p>An internet connection is required to browse the menu and place orders. Please check your connection and try again.</p>
      <a class="retry" href="/">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Try again
      </a>
    </div>
  </body>
</html>
